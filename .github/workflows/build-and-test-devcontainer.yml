name: Build and Test DevContainer then Push Prebuild Cache

on:
  push:
    paths:
      - '.devcontainer/'
  pull_request:
    paths:
      - '.devcontainer/'
  workflow_dispatch:
    inputs:
      CACHING_IMG:
        description: 'Overide Default Caching image'
        required: false
        default: 'chrisstellar/vsc-soroban-examples-95cce9-prebuild'
      OCI_CACHING_IMG:
        description: 'Override OCI caching image'
        required: false
        default: 'chrisstellar/vsc-soroban-examples-oci-prebuild'

jobs:
  shellcheck-and-test:

    name: Shellcheck linting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup PATH
        run: |
          echo ::notice title={Setup Permissions}::{Add permissions to .devcontainers/}
          chmod -R +rwx .devcontainer
          
          echo ::notice title={Setup Workspace}::{Add .devcontainers/ to PATH}
          echo "${{github.workspace}}/.devcontainer" >> "$GITHUB_PATH"
          echo "${{github.workspace}}/.devcontainer/tests" >> "$GITHUB_PATH"
          
          echo ::notice title={Test Setup}::{Print contents of .devcontainers}
          ls .devcontainer
          ls .devcontainer/tests

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        env:
          SHELLCHECK_OPTS: -s bash
        with:
          format: tty
          severity: error
          ignore_paths: tests
          additional_files: post_start_cli_autocomplete.sh
          scandir: "${{github.workspace}}/.devcontainer"
        continue-on-error: true

      - name: Run tests
        run: |
          echo ::notice title={Running Tests}::{Testing devcontainer lifecycle scripts}
          .devcontainer/tests/post_start_cli_autocomplete_test.sh
          echo "### Tests Complete :rocket:" >> $GITHUB_STEP_SUMMARY
        shell: bash


  build-and-push-cache:
    name: Setup Devcontainer CLI
    runs-on: ubuntu-latest
    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - run: npm install npm install -g @devcontainers/cli
        working-directory: ${{ github.action_path }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: true
          cache-binary: 'true'

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/amd64/v2,linux/amd64/v3,linux/arm64,linux/arm64/v8
          cache-image: 'true'
          image: 'docker.io/tonistiigi/binfmt:latest'

      - name: Test build and push manual prebuild cache
        run: |
          ls
          chmod +x tests/build_devcontainer_ci.sh
          tests/build_devcontainer_ci.sh $CACHING_IMG $OCI_CACHING_IMG
        env:
          CACHING_IMG: ${{ github.event.inputs.CACHING_IMG }}
          OCI_CACHING_IMG: ${{ github.event.inputs.OCI_CACHING_IMG }}
          BUILDKIT_INLINE_CACHE: 1