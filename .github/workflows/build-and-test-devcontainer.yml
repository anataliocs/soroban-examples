name: Build and Test DevContainer then Push Prebuild Cache

on:
  push:
    paths:
      - '.devcontainer/'
  pull_request:
    paths:
      - '.devcontainer/'
  workflow_dispatch:
    inputs:
      CACHING_IMG:
        description: 'Overide Default Caching image'
        required: false
        default: 'chrisstellar/vsc-soroban-examples-95cce9-prebuild'
      OCI_CACHING_IMG:
        description: 'Override OCI caching image'
        required: false
        default: 'chrisstellar/vsc-soroban-examples-oci-prebuild'

jobs:
  test-and-build-devcontainer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          clean: 'true'
          show-progress: 'true'
          path: ${{github.workspace}}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - run: |
          npm install npm install -g @devcontainers/cli
          npm install -g flatten-this-folder
          echo "Flattening directory structure"
          flatten .devcontainer
          ls

      - name: Run Shellcheck on Devcontainer scripts
        uses: ludeeus/action-shellcheck@master
        with:
          format: 'gcc'
          severity: 'warning'
          scandir: '.devcontainer/'
          ignore_paths: 'tests'
          additional_files: 'post_start_cli_autocomplete.sh'

      - name: Run tests
        run: |
          run: |
          ls
          chmod +x .devcontainer/tests/run_tests.sh
          .devcontainer/tests/run_tests.sh
          echo "Tests complete!"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/amd64/v2,linux/amd64/v3,linux/arm64,linux/arm64/v8
          cache-image: 'true'
          image: 'docker.io/tonistiigi/binfmt:latest'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: true
          cache-binary: 'true'

      - name: Test build and push manual prebuild cache
        run: |
          ls
          chmod +x .devcontainer/tests/build_devcontainer_ci.sh
          .devcontainer/tests/build_devcontainer_ci.sh $CACHING_IMG $OCI_CACHING_IMG
        env:
          CACHING_IMG: ${{ github.event.inputs.CACHING_IMG }}
          OCI_CACHING_IMG: ${{ github.event.inputs.OCI_CACHING_IMG }}
          BUILDKIT_INLINE_CACHE: 1